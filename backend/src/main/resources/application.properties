# ===================================================================
# Illness & Wellness Hospital Management System - Backend Config
# ===================================================================

spring.application.name=hms-backend
server.port=8080
# ?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# ---- MySQL Datasource ----
# Create the database first:  CREATE DATABASE hms_db;
spring.datasource.url=jdbc:mysql://localhost:3306/hms_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# update -> keeps your data between restarts and auto-creates/updates tables.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# open-in-view=true (Spring Boot's default) keeps the Hibernate session open for
# the whole request, so lazy associations (doctor.user, appointment.doctor, etc.)
# can still be read while building responses. Without this, every list endpoint
# that walks a lazy relationship would throw LazyInitializationException.
spring.jpa.open-in-view=true

# ---- Jackson ----
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ---- JWT ----
# 64+ character secret used to sign tokens (HS256). Change this in production!
app.jwt.secret=ChangeThisSuperSecretKeyForHMSAppointmentSchedulingSystem2026!!
# 24 hours in milliseconds
app.jwt.expiration-ms=86400000

# ---- CORS ----
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ---- Seed admin account (created automatically on first run) ----
app.seed.admin-email=admin@hms.com
app.seed.admin-password=Admin@123

# ---- Logging ----
logging.level.org.springframework.security=INFO
logging.level.com.hms.backend=DEBUG
